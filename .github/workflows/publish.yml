name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify-version:
    name: Verify tag matches pyproject.toml
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check tag version == pyproject.toml version
        id: check
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].+)?$ ]]; then
            echo "::error::Tag '$TAG' must look like v1.0.1 (optional pre-release suffix allowed)"
            exit 1
          fi

          TAG_VERSION="${TAG#v}"

          PYPROJECT_VERSION="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )"

          echo "Tag version:       ${TAG_VERSION}"
          echo "pyproject version: ${PYPROJECT_VERSION}"

          if [[ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]]; then
            echo "::error::Version mismatch: tag v${TAG_VERSION} != pyproject.toml ${PYPROJECT_VERSION}"
            exit 1
          fi

          echo "version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Versions match: ${TAG_VERSION}"

  build:
    name: Build distributions
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/honkai_cards/
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}
